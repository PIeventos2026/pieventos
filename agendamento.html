
<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="shortcut icon" href="img/shortcut_iconcps.png" type="image/x-icon">
    <title>Fatec Taquaritinga</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="script.js"></script>

    <header>

    <!-- TOPO PRETO -->
    <div class="topo-preto">
        <div class="container topo-content">
            <img src="img/logo-governo-do-estado-sp.png" class="logo-sp">
            

        </div>
    </div>

    <!-- ÁREA PRINCIPAL -->
    <div class="topo-branco">
        <div class="container topo-main">

            <div class="logos">
                <img src="img/logo-fatec-taquaritinga.png" class="logo-fatec">
            </div>

            <div class="busca">
                <input type="text" placeholder="O que deseja localizar?">
                <button>🔍</button>
            </div>

        </div>
    </div>

    <!-- MENU VERMELHO -->
    <nav class="menu">
        <ul class="container">
            <li>INICIO</li>
            <li>CURSOS ▾</li>
            <li>INSTITUCIONAL ▾</li>
            <li>HORÁRIO DE AULA</li>
            <li>LINKS ÚTEIS ▾</li>
            <li>PROFESSOR ▾</li>
            <li>ALUNO ▾</li>
            <li>VESTIBULAR ▾</li>
            <li>AJUDA</li>
            <a class="link" href="eventos.html">EVENTOS</a>
        </ul>
    </nav>
</header>   
<!--BODY-->

<section class="agendamento container">
    <h2>Agendar Novo Evento</h2>

    <form id="formEvento">

        <input 
            type="text" 
            placeholder="Nome do Evento" 
            required
        >

        <input 
            type="text" 
            placeholder="Professor Responsável" 
            required
        >

        <input 
            type="date" 
            required
        >

        <input 
            type="time" 
            required
        >

        <select required>
            <option value="">Selecione o local</option>
            <option>Auditório</option>
            <option>Laboratório 1</option>
            <option>Laboratório 2</option>
        </select>

        <textarea 
            placeholder="Descrição do evento"
        ></textarea>

        <button type="submit">Agendar</button>

    </form>
</section>
</body>
</html>
